<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小众乐器教学</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <header class="page-header">
                <h1>小众乐器教学</h1>
            </header>
            <div class="page-content">
                <div class="search-section">
                    <input type="text" id="teacher-search" placeholder="搜索老师或乐器...">
                </div>
                <div class="teachers-list" id="teachers-list">
                    <!-- 老师列表将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 课程页面 -->
        <div id="courses-page" class="page">
            <header class="page-header">
                <h1>线上课程</h1>
            </header>
            <div class="page-content">
                <div class="day-selector" id="day-selector">
                    <!-- 日期选择器将通过JS动态生成 -->
                </div>
                <div class="courses-list" id="courses-list">
                    <!-- 课程列表将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 打卡页面 -->
        <div id="checkin-page" class="page">
            <header class="page-header">
                <h1>练习打卡</h1>
            </header>
            <div class="page-content">
                <div class="instrument-tabs" id="instrument-tabs">
                    <!-- 乐器分类标签将通过JS动态生成 -->
                </div>
                <div class="checkin-plans" id="checkin-plans">
                    <!-- 打卡计划将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <!-- 我的页面 -->
        <div id="profile-page" class="page">
            <header class="page-header">
                <h1>我的</h1>
            </header>
            <div class="page-content">
                <div class="user-info">
                    <div class="avatar-container">
                        <div class="avatar-wrapper">
                            <img id="user-avatar" src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=user%20avatar%20musician%20profile%20picture&image_size=square" alt="头像">
                            <button id="edit-avatar-btn" class="edit-icon-btn">
                                <i class="fas fa-camera"></i>
                            </button>
                        </div>
                    </div>
                    <div class="username-container">
                        <div class="username-wrapper">
                            <span id="user-username">音乐爱好者</span>
                            <button id="edit-username-btn" class="edit-icon-btn">
                                <i class="fas fa-pen"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="menu-section">
                    <div class="menu-item" id="menu-sheet">
                        <span><i class="fas fa-music"></i> 乐谱下载</span>
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="menu-item" id="menu-settings">
                        <span><i class="fas fa-cog"></i> 设置</span>
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="home">
                <span class="nav-icon"><i class="fas fa-home"></i></span>
                <span class="nav-label">首页</span>
            </button>
            <button class="nav-item" data-page="courses">
                <span class="nav-icon"><i class="fas fa-book-open"></i></span>
                <span class="nav-label">课程</span>
            </button>
            <button class="nav-item" data-page="checkin">
                <span class="nav-icon"><i class="fas fa-check-circle"></i></span>
                <span class="nav-label">打卡</span>
            </button>
            <button class="nav-item" data-page="profile">
                <span class="nav-icon"><i class="fas fa-user"></i></span>
                <span class="nav-label">我的</span>
            </button>
        </nav>

        <!-- 老师详情弹窗 -->
        <div id="teacher-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-teacher-name">老师详情</h2>
                    <button id="close-teacher-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="teacher-modal-body">
                    <!-- 老师详情内容 -->
                </div>
            </div>
        </div>

        <!-- 课程报名弹窗 -->
        <div id="course-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-course-name">课程详情</h2>
                    <button id="close-course-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="course-modal-body">
                    <!-- 课程详情内容 -->
                </div>
            </div>
        </div>

        <!-- 打卡详情弹窗 -->
        <div id="checkin-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-checkin-name">打卡详情</h2>
                    <button id="close-checkin-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="checkin-modal-body">
                    <!-- 打卡详情内容 -->
                </div>
            </div>
        </div>

        <!-- 乐谱页面弹窗 -->
        <div id="sheet-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>乐谱下载</h2>
                    <button id="close-sheet-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body" id="sheet-modal-body">
                    <!-- 乐谱列表内容 -->
                </div>
            </div>
        </div>

        <!-- 编辑用户名弹窗 -->
        <div id="edit-username-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>编辑用户名</h2>
                    <button id="close-username-modal" class="close-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="new-username-input" placeholder="请输入新用户名">
                    <button id="save-username-btn" class="primary-btn">保存</button>
                </div>
            </div>
        </div>

        <!-- 视频播放弹窗 -->
        <div id="video-modal" class="modal">
            <div class="modal-content video-modal-content">
                <div class="modal-header">
                    <h2 id="modal-video-title">视频播放</h2>
                    <button id="close-video-modal" class="close-btn"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="video-container">
                        <video id="video-player" controls>
                            <source src="" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>
                        <div class="video-placeholder">
                            <div class="video-placeholder-content">
                                <i class="fas fa-play-circle"></i>
                                <p>视频播放功能演示</p>
                                <p id="placeholder-video-title"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示容器 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
